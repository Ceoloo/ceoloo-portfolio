<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" rx="28" fill="#070b11"/><rect x="24" y="24" width="1152" height="672" rx="24" fill="#101720" stroke="#263041"/><text x="58" y="72" fill="#f5f7fb" font-family="Arial" font-size="24" font-weight="700">Cloud Support Lab</text><text x="58" y="102" fill="#8591a4" font-family="Arial" font-size="14">Linux • Networking • Monitoring • Incident Response</text><rect x="58" y="136" width="700" height="512" rx="18" fill="#06090e" stroke="#263041"/><circle cx="88" cy="166" r="7" fill="#ff6b6b"/><circle cx="112" cy="166" r="7" fill="#ffd166"/><circle cx="136" cy="166" r="7" fill="#a8ff60"/><g font-family="monospace" font-size="16"><text x="84" y="216" fill="#63e6ff">$ ssh cloud-lab@10.0.0.24</text><text x="84" y="252" fill="#a8ff60">Connected to ubuntu-support-node</text><text x="84" y="300" fill="#cbd5e1">$ systemctl status api.service</text><text x="84" y="336" fill="#a8ff60">● api.service — active (running)</text><text x="84" y="384" fill="#cbd5e1">$ curl -I https://service.internal/health</text><text x="84" y="420" fill="#63e6ff">HTTP/2 200</text><text x="84" y="468" fill="#cbd5e1">$ ss -tulpn | grep :443</text><text x="84" y="504" fill="#a8ff60">LISTEN 0 4096 0.0.0.0:443</text><text x="84" y="552" fill="#cbd5e1">$ tail -f /var/log/app/error.log</text><text x="84" y="588" fill="#8591a4">No critical errors detected.</text></g><rect x="786" y="136" width="356" height="238" rx="18" fill="#141d28" stroke="#263041"/><text x="812" y="174" fill="#f5f7fb" font-family="Arial" font-size="18" font-weight="700">Node Health</text><text x="812" y="226" fill="#8591a4" font-family="Arial" font-size="14">CPU</text><rect x="884" y="212" width="220" height="16" rx="8" fill="#263041"/><rect x="884" y="212" width="94" height="16" rx="8" fill="#63e6ff"/><text x="812" y="276" fill="#8591a4" font-family="Arial" font-size="14">RAM</text><rect x="884" y="262" width="220" height="16" rx="8" fill="#263041"/><rect x="884" y="262" width="132" height="16" rx="8" fill="#a8ff60"/><text x="812" y="326" fill="#8591a4" font-family="Arial" font-size="14">DISK</text><rect x="884" y="312" width="220" height="16" rx="8" fill="#263041"/><rect x="884" y="312" width="72" height="16" rx="8" fill="#ffd166"/><rect x="786" y="398" width="356" height="250" rx="18" fill="#141d28" stroke="#263041"/><text x="812" y="438" fill="#f5f7fb" font-family="Arial" font-size="18" font-weight="700">Incident Checklist</text><g fill="#a8ff60"><circle cx="824" cy="482" r="7"/><circle cx="824" cy="526" r="7"/><circle cx="824" cy="570" r="7"/></g><g fill="#cbd5e1" font-family="Arial" font-size="14"><text x="844" y="488">Confirm service impact</text><text x="844" y="532">Inspect logs and ports</text><text x="844" y="576">Document root cause</text></g></svg>